<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>WordLens Settings</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <h2>WordLens Settings</h2>
    <div id="status"></div>
    <div class="form-group">
        <label>Pixabay API Key</label>
        <input type="text" id="pixabayKey" placeholder="Your Pixabay API Key">
    </div>
    <div class="form-group">
        <label>Custom Dictionary URL (use {%s} for word)</label>
        <input type="text" id="customDictUrl" placeholder="https://dictionary.cambridge.org/dictionary/english/{%s}">
    </div>
    <button id="saveBtn">Save Settings</button>
    <button id="instructionBtn" class="footer-btn">How to Use (GitHub)</button>

    <script src="popup.js"></script>
</body>

</html>
