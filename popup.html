<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>WordLens Settings</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <h2>WordLens Settings</h2>

    <div id="status"></div>

    <div class="form-group">
        <label>Pixabay API Key</label>
        <input type="text" id="pixabayKey" placeholder="Your Pixabay API Key">
    </div>

    <div class="form-group" id="dictionariesSection">
        <label>Custom Dictionaries</label>
        <div id="dictionariesList"></div>
        <button id="addDictBtn" type="button" class="btn-secondary">+ Add Dictionary</button>
    </div>

    <div class="save">
        <button id="instructionBtn" class="footer-btn">User Guide for WordLens</button>
        <button id="saveBtn">Save Settings</button>
    </div>


    <script src="popup.js"></script>
</body>

</html>
