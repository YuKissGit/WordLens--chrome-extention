<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Wordbook - WordLens</title>
    <link rel="stylesheet" href="wordbook.css">
</head>

<body>
    <div class="container">
        <h1>Your Wordbook</h1>
        <div class="toolbar">
            <button id="copyBtn">Copy All</button>
            <button id="clearBtn" class="danger">Clear Wordbook</button>
        </div>
        <table id="wordTable">
            <thead>
                <tr>
                    <th>Word</th>
                    <th>Definition</th>
                    <th>Example</th>
                    <th>Synonyms</th>
                    <th>Antonyms</th>
                </tr>
            </thead>
            <tbody>
                <!-- Data injected here -->
            </tbody>
        </table>
    </div>
    <script src="wordbook.js"></script>
</body>

</html>
