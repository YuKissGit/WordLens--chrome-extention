<!DOCTYPE html>
<html>
<head>
  <title>Extension Options</title>
  <style>
    body { font-family: sans-serif; padding: 20px; width: 400px; }
    label { display: block; margin-top: 15px; font-weight: bold; }
    input { width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; }
    .note { font-size: 12px; color: #666; margin-top: 4px; }
    button { margin-top: 20px; padding: 10px 20px; background: #4CAF50; color: white; border: none; cursor: pointer; }
    button:hover { background: #45a049; }
    #status { margin-top: 10px; color: green; height: 20px; }
  </style>
</head>
<body>
  <h2>Extension Settings</h2>

  <label for="apiKey">Google API Key:</label>
  <input type="text" id="apiKey" placeholder="Enter your Google Cloud API Key">
  <div class="note">Required for Image Search. Enable "Custom Search API".</div>

  <label for="cx">Search Engine ID (CX):</label>
  <input type="text" id="cx" placeholder="0123456789...">
  <div class="note">From cse.google.com. Ensure "Image search" is enabled.</div>

  <label for="customUrl">Custom Dictionary URL:</label>
  <input type="text" id="customUrl" placeholder="https://www.bing.com/dict/search?q=">
  <div class="note">The selected word will be appended to this URL.</div>

  <button id="save">Save Settings</button>
  <div id="status"></div>

  <script src="options.js"></script>
</body>
</html>
